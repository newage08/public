<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>妄想タイムテーブル</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1 class="brand">妄想タイムテーブル</h1>
    <div class="controls">
      <label>フェス<select id="festival"></select></label>
      <label>年<select id="year"></select></label>
      <label>日<select id="dayFilter"></select></label>
      <form id="quickAddForm" class="quickAddForm" autocomplete="off">
        <input id="quickAddInput" type="text" placeholder="アーティストを追加" />
        <button id="quickAddBtn" type="submit">追加</button>
      </form>
      <button id="timeEditToggle" type="button" aria-pressed="false">時間編集OFF</button>
      <button id="resetTimeBtn" type="button">時間リセット</button>
      <button id="exportImageBtn">画像</button>
    </div>
  </header>

  <main class="app">
    <section class="boardPane">
      <div class="boardHead">
        <h2 id="boardTitle">妄想タイムテーブル</h2>
        <div class="boardMeta">
          <div id="summary" class="summary"></div>
          <a id="posterLink" class="posterLink" href="#" target="_blank" rel="noopener noreferrer">公式</a>
        </div>
      </div>
      <div id="board" class="board"></div>
    </section>

    <aside class="poolPane" id="poolDropZone">
      <div id="pool" class="pool"></div>
      <p id="message" class="message"></p>
    </aside>
  </main>

  <script src="script.js?v=20260419c"></script>
</body>
</html>
